services:
  # Build the Lambda extension layer
  build-layer:
    build:
      context: ..
      dockerfile: lambda/Dockerfile
    platform: linux/arm64
    # This service is just for building - extracts to .layers/
    # Usage: docker-compose run --rm build-layer
    entrypoint: ["/bin/true"]

  # Lambda extension test using AWS Lambda RIE
  lambda-test:
    image: public.ecr.aws/lambda/python:3.12-arm64@sha256:3fd6ba1b3f64678bae65edcc9ec65b1ac919294ff186e8ad3d69af00fca19158
    platform: linux/arm64
    ports:
      - "9000:8080"
    volumes:
      # Mount the built layer from local .layers directory
      - ./.layers/extensions:/opt/extensions:ro
      - ./.layers/bin:/opt/bin:ro
      - ./.layers/lib:/opt/lib:ro
      # Mount test handler
      - ./test_handler.py:/var/task/handler.py:ro
    environment:
      # Lambda handler
      AWS_LAMBDA_FUNCTION_HANDLER: handler.handler
      # Extension configuration
      TERO_LISTEN_PORT: "3000"
      TERO_UPSTREAM_URL: https://http-intake.logs.us5.datadoghq.com
      TERO_LOGS_URL: https://http-intake.logs.us5.datadoghq.com
      TERO_METRICS_URL: https://api.datadoghq.com
      TERO_POLICY_STATIC: '{"policies":[{"id":"drop-health","name":"Drop health checks","log":{"match":[{"log_field":"body","regex":"^Test log from Lambda.*"}],"keep":"none"}}]}'
      TERO_LOG_LEVEL: debug
      # --- s3-dump extension (Datadog logs -> S3), disabled above by default ---
      # On Lambda config is env-only, so targets come as a JSON array (zonfig
      # can't express a slice-of-struct from a plain env var).
      # A policy with `extension: {kind: "s3", name: "main"}` routes records here.
      # TERO_S3_DUMP_ENABLED: "true"
      # TERO_S3_DUMP_TARGETS_JSON: '[{"name":"main","bucket":"my-logs","region":"us-east-1","prefix":"datadog/","endpoint":"https://s3.us-east-1.amazonaws.com","force_path_style":false}]'
      # Credentials: on Lambda the execution role's own creds (the reserved
      # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_SESSION_TOKEN) now work
      # directly — the signer sends x-amz-security-token. Set the TERO_S3_* names
      # below only for a static IAM-user keypair the runtime won't clobber:
      # TERO_S3_ACCESS_KEY_ID: "AKIA..."
      # TERO_S3_SECRET_ACCESS_KEY: "..."
      # TERO_S3_SESSION_TOKEN: "..."   # optional; only for temporary TERO_S3_* creds
    command: ["handler.handler"]

  # Optional: Mock upstream for testing without real Datadog
  mock-upstream:
    image: nginx:alpine@sha256:4a73073bd557c65b759505da037898b61f1be6cbcc3c2c3aeac22d2a470c1752
    ports:
      - "9001:80"
    volumes:
      - ./mock-upstream.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - mock
