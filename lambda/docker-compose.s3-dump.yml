# Overlay for a local end-to-end s3-dump test against MinIO.
#
#   docker compose -f docker-compose.yml -f docker-compose.s3-dump.yml up -d
#   ./s3-dump-test.sh            # invoke a few times + list the bucket
#
# Adds a MinIO S3 target + a one-shot bucket creator, and reconfigures
# lambda-test with the dump-all policy (s3-dump extension) pointing at MinIO.
services:
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000" # host access for listing/inspection

  # Waits for MinIO, then creates the dump bucket. Runs once and exits.
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 1; done &&
      mc mb -p local/tero-edge-dump &&
      echo 'bucket tero-edge-dump ready'
      "

  lambda-test:
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    environment:
      # Forwarding target is irrelevant to the dump; keep it pointed anywhere.
      AWS_LAMBDA_FUNCTION_HANDLER: handler.handler
      TERO_LISTEN_PORT: "3000"
      TERO_LOG_LEVEL: debug
      # --- s3-dump: enable + MinIO target (path-style, no TLS) ---
      TERO_S3_DUMP_ENABLED: "true"
      # Small batch age so the non-force invoke-boundary flush seals promptly and
      # you see objects within a couple invokes (default 30s; prod can stay high).
      TERO_S3_DUMP_MAX_BATCH_AGE_MS: "2000"
      TERO_S3_DUMP_TARGETS_JSON: '[{"name":"datadog-forwarder-dump","bucket":"tero-edge-dump","region":"us-east-1","endpoint":"http://minio:9000","force_path_style":true,"prefix":"dump/"}]'
      # MinIO creds via the TERO_S3_* set (the reserved AWS_* names are off-limits).
      TERO_S3_ACCESS_KEY_ID: minioadmin
      TERO_S3_SECRET_ACCESS_KEY: minioadmin
      # --- dump-all policy carrying the s3-dump extension (needs policy-zig >= v0.6.0) ---
      # NOTE: match uses `exists` on body, NOT regex ".*" — Hyperscan rejects a
      # pattern that can match the empty buffer, which would make the whole
      # policy invalid. `mode:"all"` delivers every record to the extension
      # regardless of match anyway, so `exists` is the right "dump everything".
      TERO_POLICY_STATIC: '{"policies":[{"id":"dump-all","name":"Dump all logs to S3","enabled":true,"log":{"keep":"all","match":[{"log_field":"body","exists":true}]},"extensions":[{"type":"com.usetero/s3-dump","version":"1.0.0","mode":"all","target":{"kind":"s3","name":"datadog-forwarder-dump"}}]}]}'
